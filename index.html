<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Compressor (HEIC + JPEG/PNG/WebP)</title>

<!-- Image Compression -->
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

<!-- libheif-js (decode HEIC in browser) -->
<script src="https://cdn.jsdelivr.net/npm/libheif-js@1.19.8/libheif-wasm/libheif-bundle.js"></script>

<!-- ZIP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{background:#121212;color:white;font-family:Segoe UI;display:flex;justify-content:center;padding:40px;}
.card{width:720px;background:#1e1e1e;padding:20px;border-radius:12px;border:2px solid #2a2a2a;}
button{padding:10px 16px;margin-right:10px;border:none;border-radius:8px;background:#4caf50;color:white;font-weight:bold;cursor:pointer;}
.progress{width:100%;height:20px;background:#333;border-radius:10px;margin-top:10px;}
.bar{height:100%;width:0%;background:#1e90ff;border-radius:10px;transition:width 0.2s;}
pre{margin-top:15px;background:#111;padding:15px;border-radius:8px;color:#1e90ff;max-height:250px;overflow:auto;}
</style>
</head>
<body>
<div class="card">
    <input type="file" id="folderInput" webkitdirectory multiple>
    <div style="margin-top:10px;">
        <button onclick="start(512)">Compress to 512 KB</button>
        <button onclick="start(300)">Compress to 300 KB</button>
        <button onclick="start(70)">Compress to 70 KB</button>
    </div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <pre id="log"></pre>
</div>

<script>
const log = document.getElementById("log");
const bar = document.getElementById("bar");
function write(text){ log.textContent += text+"\n"; log.scrollTop = log.scrollHeight; }

// Detect HEIC by extension
function isHeic(file){ return file.name.toLowerCase().match(/\.(heic|heif)$/i); }

// Decode HEIC → JPEG via libheif-js
async function decodeHeicToJpegBlob(file){
    write("HEIC decode: "+file.name);
    const decoder = new libheif.HeifDecoder();
    const arrayBuffer = await file.arrayBuffer();
    const heifImages = decoder.decode(new Uint8Array(arrayBuffer));
    const image = heifImages[0];
    const width = image.get_width();
    const height = image.get_height();
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    const imageData = ctx.createImageData(width, height);
    await new Promise((resolve,reject)=>{
        image.display(imageData, (data)=>{if(!data) reject("HEIF display error"); else resolve();});
    });
    ctx.putImageData(imageData,0,0);
    return await new Promise(resolve => canvas.toBlob(resolve,"image/jpeg",1.0));
}

// Compress JPEG/PNG/WebP
async function compressNormalImage(file,targetKB){
    return await imageCompression(file,{
        maxSizeMB: Math.max(targetKB,300)/1024,
        maxWidthOrHeight:1600,
        initialQuality:0.7,
        useWebWorker:true
    });
}

// Convert + compress any image
async function convertAndCompress(file,targetKB){
    if(isHeic(file)){
        const blob = await decodeHeicToJpegBlob(file);
        const heicFile = new File([blob], file.name.replace(/\.(heic|heif)$/i,".jpg"), {type:"image/jpeg"});
        return await compressNormalImage(heicFile,targetKB);
    } else {
        return await compressNormalImage(file,targetKB);
    }
}

async function start(targetKB){
    const input = document.getElementById("folderInput");
    const files = Array.from(input.files);
    if(!files.length) return alert("Select a folder first");

    const images = files.filter(f =>
        f.type.startsWith("image/") ||
        f.name.match(/\.(jpg|jpeg|png|webp|heic|heif)$/i)
    );

    log.textContent="";
    bar.style.width="0%";
    bar.style.background="#1e90ff";
    write(`Compressing images → target ${targetKB} KB`);
    write(`Found ${images.length} image(s)\n`);

    const zip = new JSZip();
    let done = 0;

    for(const file of images){
        try{
            const result = await convertAndCompress(file,targetKB);
            zip.file(result.name||file.name,result);
            done++;
            bar.style.width = Math.round((done/images.length)*100)+"%";
            write("✔ "+(result.name||file.name));
        } catch(e){
            write("✖ "+file.name+" error");
            console.error(e);
        }
    }

    write("\nCreating ZIP...");
    const blob = await zip.generateAsync({type:"blob"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download="compressed_images.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);

    bar.style.background="#4caf50";
    write("\nDone!");
}
</script>
</body>
</html>
